{% extends "base.html" %}
{% set active_page = "settings" %}
{% block title %}Settings Login — Architecture Agent{% endblock %}

{% block content %}
<div style="padding: 32px; max-width: 480px; margin: 80px auto 0;">
  <div class="card" style="padding: 32px;">
    <h2 style="font-size: 20px; font-weight: 600; margin-bottom: 8px; text-align: center;">
      Settings Protected
    </h2>
    <p style="color: var(--text-dim); font-size: 14px; text-align: center; margin-bottom: 24px;">
      Enter the admin password to access LLM provider settings.
    </p>
    {% if error %}
    <div style="background: rgba(239,68,68,0.1); border: 1px solid rgba(239,68,68,0.3); border-radius: 8px; padding: 10px 14px; margin-bottom: 16px; color: #f87171; font-size: 13px; text-align: center;">
      {{ error }}
    </div>
    {% endif %}
    <form method="POST" action="{{ pfx }}/settings/login">
      <label style="display: block; font-size: 13px; font-weight: 500; color: var(--text-dim); margin-bottom: 6px;">Password</label>
      <input type="password" name="password" autofocus required
        style="width: 100%; padding: 10px 12px; background: var(--bg); border: 1px solid var(--border); border-radius: 8px; color: var(--text); font-size: 14px; font-family: 'IBM Plex Sans', sans-serif; box-sizing: border-box; margin-bottom: 16px;">
      <button type="submit"
        style="width: 100%; padding: 10px; background: var(--accent); color: #fff; border: none; border-radius: 8px; font-size: 14px; font-weight: 600; cursor: pointer; font-family: 'IBM Plex Sans', sans-serif;">
        Unlock Settings
      </button>
    </form>
  </div>
</div>
{% endblock %}
