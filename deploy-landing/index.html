<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LLM Engineering Course</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#0f172a;color:#e2e8f0;min-height:100vh}
  .header{text-align:center;padding:3rem 1rem 2rem;background:linear-gradient(135deg,#1e293b 0%,#0f172a 100%);border-bottom:1px solid #1e293b}
  .header h1{font-size:2.4rem;font-weight:700;background:linear-gradient(135deg,#60a5fa,#a78bfa);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:.5rem}
  .header p{color:#94a3b8;font-size:1.1rem;max-width:600px;margin:0 auto}
  .progress-bar{max-width:700px;margin:1.5rem auto 0;height:6px;background:#1e293b;border-radius:3px;overflow:hidden}
  .progress-fill{height:100%;background:linear-gradient(90deg,#3b82f6,#8b5cf6);border-radius:3px;transition:width .5s ease}
  .progress-label{max-width:700px;margin:.5rem auto 0;text-align:right;font-size:.85rem;color:#64748b}
  .container{max-width:900px;margin:0 auto;padding:2rem 1rem 4rem}
  .module-grid{display:flex;flex-direction:column;gap:1rem}
  .module-card{display:flex;align-items:center;gap:1.5rem;background:#1e293b;border:1px solid #334155;border-radius:12px;padding:1.25rem 1.5rem;transition:all .25s ease;position:relative;overflow:hidden;text-decoration:none;color:inherit}
  .module-card.unlocked{cursor:pointer;border-color:#3b82f6}
  .module-card.unlocked:hover{background:#263548;border-color:#60a5fa;transform:translateX(4px)}
  .module-card.completed{border-color:#22c55e;background:#162b1f}
  .module-card.completed:hover{background:#1a3524}
  .module-card.locked{opacity:.5;cursor:not-allowed}
  .module-num{width:48px;height:48px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:1.2rem;flex-shrink:0}
  .locked .module-num{background:#334155;color:#64748b}
  .unlocked .module-num{background:#3b82f6;color:#fff}
  .completed .module-num{background:#22c55e;color:#fff}
  .module-info{flex:1;min-width:0}
  .module-info h3{font-size:1.1rem;font-weight:600;margin-bottom:.25rem}
  .module-info p{font-size:.9rem;color:#94a3b8;line-height:1.4}
  .module-badge{font-size:.75rem;padding:.25rem .75rem;border-radius:20px;font-weight:600;flex-shrink:0;text-transform:uppercase;letter-spacing:.5px}
  .locked .module-badge{background:#334155;color:#64748b}
  .unlocked .module-badge{background:#1e3a5f;color:#60a5fa}
  .completed .module-badge{background:#14532d;color:#4ade80}
  .lock-icon{font-size:1.2rem;flex-shrink:0}
  .section-label{font-size:.8rem;font-weight:600;text-transform:uppercase;letter-spacing:1.5px;color:#64748b;margin:1.5rem 0 .75rem;padding-left:.5rem}
  .tools-section{margin-top:2.5rem;padding-top:2rem;border-top:1px solid #1e293b}
  .tools-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:1rem}
  .tool-card{display:block;background:#1e293b;border:1px solid #334155;border-radius:12px;padding:1.25rem 1.5rem;text-decoration:none;color:inherit;transition:all .25s ease}
  .tool-card:hover{background:#263548;border-color:#a78bfa;transform:translateY(-2px)}
  .tool-card h3{font-size:1rem;font-weight:600;color:#c4b5fd;margin-bottom:.35rem}
  .tool-card p{font-size:.85rem;color:#94a3b8;line-height:1.4}
  .reset-btn{display:block;margin:3rem auto 0;padding:.5rem 1.5rem;background:transparent;border:1px solid #475569;color:#64748b;border-radius:8px;cursor:pointer;font-size:.8rem;transition:all .2s}
  .reset-btn:hover{border-color:#ef4444;color:#ef4444}
  @media(max-width:600px){.module-card{flex-wrap:wrap;gap:1rem}.module-badge{width:100%;text-align:center}}
</style>
</head>
<body>
<div class="header">
  <h1>LLM Engineering Course</h1>
  <p>A six-part interactive curriculum covering LLM theory through applied engineering practice.</p>
  <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
  <div class="progress-label" id="progressLabel">0 / 6 modules completed</div>
</div>
<div class="container">
  <div class="section-label">Course Modules</div>
  <div class="module-grid" id="moduleGrid"></div>
  <div class="tools-section" id="toolsSection" style="display:none">
    <div class="section-label">Standalone Tools</div>
    <div class="tools-grid" id="toolsGrid"></div>
  </div>
  <button class="reset-btn" onclick="if(confirm('Reset all progress? This cannot be undone.')){localStorage.removeItem('llm_course_progress');location.reload()}">Reset Progress</button>
</div>
<script>
const MODULES = [
  {id:'part1',num:1,title:'How LLMs Actually Work',desc:'Self-attention, context density, hallucination mechanics, and feature activation landscapes.',path:'/part1/',slides:23,recording:'https://drive.google.com/file/d/1X9PWy9aUfCaIb97KgC12U_S4neNzxSDB/view?usp=sharing'},
  {id:'part2',num:2,title:'Working WITH LLMs',desc:'10-channel density methodology, comparative results, run-to-run consistency, and agentic systems.',path:'/part2/',slides:16,recording:'https://drive.google.com/file/d/1Cm0PhwRxaArwRjxv9DbK7vJpJcFvBFam/view'},
  {id:'part3',num:3,title:'Building with LLMs',desc:'Decomposition, orchestration patterns, parallelism, and costing dashboards.',path:'/part3/',slides:24},
  {id:'part4',num:4,title:'Testing with LLMs',desc:'Unit, functional, E2E, and load testing. The happy-path fallacy.',path:'/part4/',slides:22},
  {id:'part5',num:5,title:'Deploying with LLMs',desc:'Environment management, versioning, pull/push deploy, and auto-scaling.',path:'/part5/',slides:19},
  {id:'part6',num:6,title:'CI/CD with LLMs',desc:'Checkpoint pipelines, ownership models, speed-safety litmus, and logging.',path:'/part6/',slides:24}
];

const TOOLS = [
  {id:'tool1',title:'Architecture Agent',desc:'10-channel structured intake that produces dense architecture specifications for one-shot LLM execution.',path:'/architect/'},
  {id:'tool2',title:'Decomposition Visualizer',desc:'Interactive wave-plan visualizer showing dependency-ordered parallel build planning.',path:'/decompose/'}
];

function getProgress(){
  try{return JSON.parse(localStorage.getItem('llm_course_progress'))||{}}catch(e){return{}}
}

var serverLocks={};

function render(){
  const progress=getProgress();
  const completed=MODULES.filter(m=>progress[m.id]).length;
  document.getElementById('progressFill').style.width=((completed/MODULES.length)*100)+'%';
  document.getElementById('progressLabel').textContent=completed+' / '+MODULES.length+' modules completed';

  const grid=document.getElementById('moduleGrid');
  grid.innerHTML='';
  MODULES.forEach((m,i)=>{
    const done=!!progress[m.id];
    const prevDone=i===0||!!progress[MODULES[i-1].id];
    const adminLocked=!!serverLocks[m.id];
    const unlocked=!adminLocked&&(done||prevDone);
    const state=adminLocked?'locked':done?'completed':unlocked?'unlocked':'locked';

    const card=document.createElement(unlocked?'a':'div');
    card.className='module-card '+state;
    if(unlocked)card.href=m.path;

    var badgeText=adminLocked?'Admin Locked':done?'Completed':unlocked?'Start':'Locked';
    var recLink=m.recording?'<span class="rec-link" data-url="'+m.recording+'" style="display:inline-flex;align-items:center;gap:4px;margin-top:6px;font-size:12px;color:#a78bfa;cursor:pointer;"><span style="font-size:14px">&#9654;</span> Watch Recording</span>':'';
    card.innerHTML='<div class="module-num">'+(done&&!adminLocked?'&#10003;':m.num)+'</div>'
      +'<div class="module-info"><h3>Part '+m.num+': '+m.title+'</h3><p>'+m.desc+'</p>'+recLink+'</div>'
      +'<span class="module-badge">'+badgeText+'</span>'
      +(!unlocked?'<span class="lock-icon">&#128274;</span>':'');
    var rec=card.querySelector('.rec-link');
    if(rec)rec.addEventListener('click',function(e){e.preventDefault();e.stopPropagation();window.open(this.dataset.url,'_blank');});
    grid.appendChild(card);
  });

  if(TOOLS.length){
    document.getElementById('toolsSection').style.display='block';
    const tg=document.getElementById('toolsGrid');
    tg.innerHTML='';
    TOOLS.forEach(t=>{
      const a=document.createElement('a');
      a.className='tool-card';
      a.href=t.path;
      a.innerHTML=`<h3>${t.title}</h3><p>${t.desc}</p>`;
      tg.appendChild(a);
    });
  }
}
render();
fetch('/api/analytics/locks').then(function(r){return r.json()}).then(function(locks){serverLocks=locks;render();}).catch(function(){});
</script>
</body>
</html>
